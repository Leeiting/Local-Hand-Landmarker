<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Hand Landmarker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Local Hand Landmarker</h1>
    <div class="controls">
      <button id="startBtn">啟動攝影機</button>
      <button id="stopBtn" disabled>停止攝影機</button>
      <span id="status">狀態：初始化中...</span>
    </div>
    <div class="video-wrapper">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
